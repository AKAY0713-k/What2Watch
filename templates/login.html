{% extends "base.html" %}
{% load static %}

{% block title %}
Login |
{% endblock title %}

{% block body %}

<!-- ✅ Wrapper that covers the full screen with background -->
<div class="bg-wrapper">
  <div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="glass-box">
      <h3>LOGIN</h3>

      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-danger text-center">{{ message }}</div>
        {% endfor %}
        {% endif %}

        <div class="mb-3">
          <input type="text" class="form-control" placeholder="Username" name="username" required>
        </div>
        <div class="mb-2">
          <input type="password" class="form-control" placeholder="Password" name="password" required>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input type="checkbox" class="form-check-input" id="rememberMe">
            <label class="form-check-label" for="rememberMe">Remember Me</label>
          </div>
         
        </div>

        <button type="submit" class="btn login-btn">Login</button>

        <div class="register-link">
          Don’t have an Account? <a href="{% url 'signup' %}"
            class="fw-bold text-dark text-decoration-none">Register</a>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Custom CSS -->
<style>
  .bg-wrapper {
    background: url("{% static 'img/hole.jpg' %}") no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    width: 100%;
    margin-top: -75px;
    padding-top: 75px;
  }

  .glass-box {
    background: rgba(255, 255, 255, 0.27);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 25px;
    padding: 50px;
    width: 100%;
    margin-left:55px;
    max-width: 450px;
    min-height: 450px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    color: #000000ff;
  }

  .glass-box h3 {
    text-align: center;
    font-weight: bold;
    margin-bottom: 30px;
  }

  .form-control {
    background: transparent;
    border: none;
    border-bottom: 1px solid #ccc;
    border-radius: 0;
    color: #000000ff;
  }

  .form-control:focus {
    box-shadow: none;
    border-bottom: 1px solid #19191bff;
  }

  .login-btn {
    background: linear-gradient(to right, #6a8eff, #7b9aeeff);
    border: none;
    color: white;
    width: 100%;
    margin-top: 10px;
  }

  .login-btn:hover {
    background: linear-gradient(to right, #3ec4ff, #6A00FF);
  }

  .form-links {
    font-size: 0.9rem;
    text-align: right;
  }

  .register-link {
    text-align: center;
    margin-top: 10px;
  }
</style>

{% endblock body %}
